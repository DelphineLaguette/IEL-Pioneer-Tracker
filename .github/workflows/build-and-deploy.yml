name: Build and update docs

on:
  push:
    branches:
      - claude/create-iel-tracker-repo-la3vx

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy docs to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp -r docs /tmp/built_docs
          git fetch origin main
          git checkout main
          rm -rf docs
          cp -r /tmp/built_docs docs
          git add docs/
          git diff --staged --quiet || git commit -m "chore: rebuild docs [skip ci]"
          git push origin main
